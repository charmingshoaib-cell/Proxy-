<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stake Dice Clone</title>
    <style>
        :root {
            --bg-dark: #0f212e;
            --bg-panel: #1a2c38;
            --bg-input: #0f212e;
            --text-main: #f1f3f5;
            --text-muted: #b1bad3;
            --accent-green: #00e701;
            --accent-red: #ff1f44;
            --accent-blue: #1475e1;
            --btn-hover: #1fff20;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--bg-panel);
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #2f4553;
        }

        .game-content {
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Slider Area */
        .slider-section {
            width: 100%;
            margin-bottom: 40px;
            position: relative;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 12px;
            background: var(--accent-red);
            border-radius: 6px;
            margin: 40px 0;
        }

        .slider-fill {
            position: absolute;
            height: 100%;
            background: var(--accent-green);
            border-radius: 6px;
            /* Default Over behavior: color fills from right */
            right: 0;
            width: 49.5%; 
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            cursor: pointer;
            z-index: 10;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            cursor: grab;
            border: 5px solid var(--accent-blue);
            transform: scale(1);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type="range"]::-webkit-slider-thumb:active {
            cursor: grabbing;
        }

        .result-display {
            position: absolute;
            top: -55px;
            font-size: 32px;
            font-weight: 800;
            display: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .result-display.show {
            display: block;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-display.win { color: var(--accent-green); }
        .result-display.loss { color: var(--accent-red); }

        @keyframes popIn {
            0% { transform: translate(-50%, 20px) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            margin-top: -30px;
        }

        /* Metrics */
        .metrics {
            background-color: var(--bg-dark);
            border-radius: 4px;
            padding: 16px;
            display: flex;
            width: 100%;
            justify-content: space-between;
            box-sizing: border-box;
            gap: 16px;
        }

        .metric-box {
            flex: 1;
            background: var(--bg-panel);
            padding: 12px;
            border-radius: 4px;
            text-align: left;
            border: 1px solid #2f4553;
            transition: border-color 0.2s;
        }

        .metric-box:focus-within {
            border-color: #557086;
        }

        .metric-box label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .metric-box .metric-val {
            display: flex;
            align-items: center;
        }

        .metric-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            outline: none;
        }
        
        .metric-box span {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: bold;
            margin-left: 8px;
        }

        /* Controls Area */
        .game-controls {
            background: #213743;
            padding: 24px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            border-top: 1px solid #2f4553;
        }

        .input-group {
            flex: 1;
        }

        .input-group label {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .input-group label span {
            font-weight: normal;
        }

        .input-wrapper {
            display: flex;
            background: var(--bg-dark);
            border: 1px solid #2f4553;
            border-radius: 4px;
            padding: 2px;
            transition: border-color 0.2s;
            height: 48px;
            box-sizing: border-box;
        }

        .input-wrapper:focus-within {
            border-color: #557086;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            padding: 10px 12px;
            width: 100%;
            outline: none;
            font-weight: bold;
        }

        .input-actions {
            display: flex;
            gap: 2px;
            padding: 2px;
        }

        .input-actions button {
            background: var(--bg-panel);
            color: var(--text-muted);
            border: none;
            border-radius: 2px;
            padding: 0 16px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: background 0.2s, color 0.2s;
        }

        .input-actions button:hover {
            background: #2f4553;
            color: white;
        }

        .bet-btn {
            background: var(--accent-green);
            color: #000;
            border: none;
            border-radius: 4px;
            padding: 0 40px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #00b301;
        }

        .bet-btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #00b301;
        }
        
        .bet-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #00b301;
        }
        
        .toggle-btn {
            background: var(--bg-dark);
            border: 1px solid #2f4553;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            margin: 0 auto 30px auto;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .toggle-btn:hover {
            color: white;
            border-color: #557086;
        }
        .toggle-btn svg {
            transition: transform 0.3s;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-content">
            
            <button class="toggle-btn" id="rollTypeBtn" onclick="toggleRollType()">
                <svg id="rollIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                </svg>
                <span id="rollTypeText">Roll Over</span>
            </button>

            <div class="slider-section">
                <div class="result-display" id="resultDisplay">50.00</div>
                <div class="slider-wrapper" id="sliderWrapper">
                    <div class="slider-fill" id="sliderFill"></div>
                    <input type="range" id="targetSlider" min="2" max="98" step="0.01" value="50.50" oninput="updateMetricsFromSlider(this.value)">
                </div>
                <div class="slider-labels">
                    <span>0</span>
                    <span>25</span>
                    <span>50</span>
                    <span>75</span>
                    <span>100</span>
                </div>
            </div>

            <div class="metrics">
                <div class="metric-box">
                    <label>Multiplier</label>
                    <div class="metric-val">
                        <input type="number" id="multiplierInput" value="2.0000" step="0.01" onchange="updateFromMultiplier(this.value)">
                        <span>x</span>
                    </div>
                </div>
                <div class="metric-box">
                    <label id="targetLabel">Roll Over</label>
                    <div class="metric-val">
                        <input type="number" id="targetInput" value="50.50" step="0.01" onchange="updateFromTarget(this.value)">
                        <span></span>
                    </div>
                </div>
                <div class="metric-box">
                    <label>Win Chance</label>
                    <div class="metric-val">
                        <input type="number" id="chanceInput" value="49.50" step="0.01" onchange="updateFromChance(this.value)">
                        <span>%</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="game-controls">
            <div class="input-group">
                <label>Bet Amount <span>0.00000000 BTC</span></label>
                <div class="input-wrapper">
                    <input type="number" id="betAmount" value="0.00000000" step="0.00000001" oninput="updateProfit()">
                    <div class="input-actions">
                        <button onclick="modifyBet(0.5)">½</button>
                        <button onclick="modifyBet(2)">2x</button>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Profit on Win <span>0.00000000 BTC</span></label>
                <div class="input-wrapper">
                    <input type="number" id="profit" value="0.00000000" readonly style="color: var(--accent-green)">
                    <div class="input-actions">
                        <button style="background: transparent; cursor: default"><svg width="14" height="14" viewBox="0 0 24 24" fill="var(--text-muted)" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg></button>
                    </div>
                </div>
            </div>

            <button class="bet-btn" onclick="placeBet()">Bet</button>
        </div>
    </div>

    <script>
        // Game State
        let isRollOver = true;
        let currentChance = 49.50;
        let currentTarget = 50.50;
        let currentMultiplier = 2.0000;
        const HOUSE_EDGE = 1; // 1% house edge
        
        const slider = document.getElementById('targetSlider');
        const fill = document.getElementById('sliderFill');
        const wrapper = document.getElementById('sliderWrapper');
        const rText = document.getElementById('rollTypeText');
        const rIcon = document.getElementById('rollIcon');
        const tlabel = document.getElementById('targetLabel');
        const resultDisp = document.getElementById('resultDisplay');

        function toggleRollType() {
            isRollOver = !isRollOver;
            rText.innerText = isRollOver ? 'Roll Over' : 'Roll Under';
            tlabel.innerText = isRollOver ? 'Roll Over' : 'Roll Under';
            
            // Flip the SVG icon visually
            rIcon.style.transform = isRollOver ? 'rotate(0deg)' : 'rotate(180deg)';
            
            // Recalculate based on current slider value
            updateMetricsFromSlider(slider.value);
        }

        function getMultiplier(chance) {
            return (100 - HOUSE_EDGE) / chance;
        }

        function updateMetricsFromSlider(sliderVal) {
            sliderVal = parseFloat(sliderVal);
            currentTarget = sliderVal;
            
            if (isRollOver) {
                currentChance = 100 - currentTarget;
            } else {
                currentChance = currentTarget;
            }
            
            // Limit bounds
            if (currentChance < 0.01) currentChance = 0.01;
            if (currentChance > 98) currentChance = 98;
            
            currentMultiplier = getMultiplier(currentChance);
            updateUI();
        }

        function updateFromChance(chanceVal) {
            chanceVal = parseFloat(chanceVal);
            if(chanceVal < 0.01) chanceVal = 0.01;
            if(chanceVal > 98) chanceVal = 98;
            
            currentChance = chanceVal;
            currentMultiplier = getMultiplier(currentChance);
            
            if (isRollOver) {
                currentTarget = 100 - currentChance;
            } else {
                currentTarget = currentChance;
            }
            slider.value = currentTarget;
            updateUI();
        }

        function updateFromMultiplier(multVal) {
            multVal = parseFloat(multVal);
            const minMult = (100 - HOUSE_EDGE) / 98; // ~1.0102
            if(multVal < minMult) multVal = minMult;
            
            currentChance = (100 - HOUSE_EDGE) / multVal;
            currentTarget = isRollOver ? 100 - currentChance : currentChance;
            currentMultiplier = multVal;
            slider.value = currentTarget;
            updateUI();
        }

        function updateFromTarget(targetVal) {
            targetVal = parseFloat(targetVal);
            if(targetVal < 2) targetVal = 2;
            if(targetVal > 98) targetVal = 98;
            slider.value = targetVal;
            updateMetricsFromSlider(targetVal);
        }

        function updateUI() {
            document.getElementById('chanceInput').value = currentChance.toFixed(2);
            document.getElementById('multiplierInput').value = currentMultiplier.toFixed(4);
            document.getElementById('targetInput').value = currentTarget.toFixed(2);
            
            // Update slider visual fill
            if (isRollOver) {
                fill.style.left = currentTarget + '%';
                fill.style.right = '0';
                fill.style.width = 'auto';
                fill.style.backgroundColor = 'var(--accent-green)';
                wrapper.style.background = 'var(--accent-red)';
            } else {
                fill.style.left = '0';
                fill.style.right = 'auto';
                fill.style.width = currentTarget + '%';
                fill.style.backgroundColor = 'var(--accent-green)';
                wrapper.style.background = 'var(--accent-red)';
            }

            updateProfit();
        }

        function modifyBet(factor) {
            const betInput = document.getElementById('betAmount');
            let val = parseFloat(betInput.value) || 0;
            if (val === 0 && factor > 1) {
                val = 0.00000010; // Base amount if doubling from 0
            } else {
                val = val * factor;
            }
            betInput.value = val.toFixed(8);
            updateProfit();
        }

        function updateProfit() {
            const betInput = document.getElementById('betAmount');
            const profitInput = document.getElementById('profit');
            let bet = parseFloat(betInput.value) || 0;
            let profit = (bet * currentMultiplier) - bet;
            profitInput.value = profit.toFixed(8);
        }

        function placeBet() {
            // Generate random roll
            const rollNum = Math.random() * 100;
            const rollDisplay = rollNum.toFixed(2);
            
            let isWin = false;
            if (isRollOver && rollNum > currentTarget) isWin = true;
            if (!isRollOver && rollNum < currentTarget) isWin = true;

            // Update user balance/profit visually (mocked)
            const betInput = document.getElementById('betAmount');
            let bet = parseFloat(betInput.value) || 0;
            
            // Display visual
            resultDisp.innerText = rollDisplay;
            resultDisp.className = 'result-display ' + (isWin ? 'win' : 'loss');
            
            // Move result text to match the slider thumb position (roll percentage)
            resultDisp.style.left = rollDisplay + '%';
            
            // Re-trigger animation cleanly using requestAnimationFrame hack
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    resultDisp.classList.add('show');
                });
            });
        }

        // Init
        updateUI();

    </script>
</body>
</html>
